name: Build Mod
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Build mod
        run: chmod +x gradlew && ./gradlew build
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: npcclick-mod
          path: build/libs/npcclick-*.jar
